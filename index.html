  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:   #1a5c45;
      --green2:  #236b52;
      --accent:  #2ecc96;
      --bg:      #f0f7f4;
      --surface: #ffffff;
      --border:  #cce5da;
      --text:    #0d2e21;
      --sub:     #4a7a68;
      --shadow:  0 2px 12px rgba(26,92,69,0.10);
    }

    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── HEADER ── */
    header {
      background: var(--green);
      color: #fff;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 16px rgba(26,92,69,0.3);
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 16px 11px;
    }
    .church-name h1 {
      font-size: 1.05rem; font-weight: 700; letter-spacing: -0.3px; color: #fff;
      white-space: nowrap;
    }
    .church-name .ver {
      font-size: 0.72rem; color: rgba(255,255,255,0.6); font-weight: 300;
      margin-top: 3px; white-space: nowrap;
    }
    .header-actions a {
      color: rgba(255,255,255,0.8); text-decoration: none;
      font-size: 0.73rem; padding: 5px 11px;
      border: 1px solid rgba(255,255,255,0.25); border-radius: 20px;
      white-space: nowrap; transition: background 0.2s;
    }
    .header-actions a:hover { background: rgba(255,255,255,0.12); }

    /* ── SEARCH BAR ── */
    .search-bar {
      background: rgba(0,0,0,0.14);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding: 9px 16px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .plate-input-wrapper {
      display: flex; align-items: center;
      background: rgba(255,255,255,0.13);
      border: 1.5px solid rgba(255,255,255,0.22);
      border-radius: 12px; padding: 0 16px; gap: 10px;
      transition: border-color 0.2s;
    }
    .plate-input-wrapper:focus-within { border-color: var(--accent); background: rgba(255,255,255,0.2); }
    .plate-input-wrapper .prefix { font-size: 1.05rem; opacity: 0.42; font-weight: 300; white-space: nowrap; }
    #searchInput {
      background: none; border: none; outline: none; color: #fff;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 1.7rem; font-weight: 700; letter-spacing: 6px;
      width: 118px; padding: 12px 0;
    }
    #searchInput::placeholder { color: rgba(255,255,255,0.28); letter-spacing: 5px; }
    .search-clear {
      background: none; border: none; color: rgba(255,255,255,0.5);
      cursor: pointer; font-size: 1rem; padding: 4px; transition: color 0.2s; flex-shrink: 0;
    }
    .total-badge {
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.9);
      font-size: 0.72rem; font-weight: 600;
      padding: 4px 10px; border-radius: 20px;
      white-space: nowrap; border: 1px solid rgba(255,255,255,0.2);
    }
    .result-count-badge {
      background: #e9f7f2; color: var(--green);
      font-size: 0.72rem; font-weight: 700;
      padding: 4px 11px; border-radius: 20px;
      white-space: nowrap;
    }

    /* ── MAIN ── */
    main { max-width: 960px; margin: 0 auto; padding: 14px 12px 60px; }

    /* status */
    .status-bar {
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 11px; font-size: 0.73rem; color: var(--sub);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #bbb; animation: pulse 2s infinite; }
    .dot.online  { background: #2ecc71; }
    .dot.offline { background: #e67e22; animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* loading */
    .loading-overlay {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; padding: 60px 20px; color: var(--sub);
      background: var(--surface); border-radius: 14px; border: 1px solid var(--border);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border); border-top-color: var(--green2);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── DESKTOP TABLE ── */
    .table-wrap {
      background: var(--surface); border-radius: 14px;
      box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--green); color: #fff; }
    th { padding: 12px 14px; font-size: 0.76rem; font-weight: 600; text-align: left; white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
    tbody tr:nth-child(even) { background: #f7fbf9; }
    tbody tr:hover { background: #ddf0e8; }
    tbody tr:last-child { border-bottom: none; }
    td { padding: 11px 14px; font-size: 0.84rem; }
    .plate-cell { font-weight: 700; font-size: 0.98rem; color: var(--green2); letter-spacing: 2px; }
    .owner-cell { font-weight: 500; }
    .phone-cell { font-family: monospace; font-size: 0.8rem; color: var(--sub); }
    .highlight { background: #c6f0de; border-radius: 3px; padding: 0 2px; }

    /* ── MOBILE CARD LIST ── */
    .card-list { display: none; flex-direction: column; gap: 0; }

    .vehicle-card {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 13px 14px; display: flex; align-items: center; gap: 12px;
      transition: background 0.15s; text-decoration: none; color: inherit;
    }
    .vehicle-card:first-child { border-radius: 14px 14px 0 0; }
    .vehicle-card:last-child  { border-radius: 0 0 14px 14px; border-bottom: none; }
    .vehicle-card:only-child  { border-radius: 14px; border-bottom: none; }
    .vehicle-card:active { background: #ddf0e8; }

    .card-plate {
      min-width: 64px; text-align: center;
      background: var(--green); color: #fff;
      border-radius: 10px; padding: 12px 8px;
      font-size: 1.55rem; font-weight: 800; letter-spacing: 3px; line-height: 1;
      flex-shrink: 0;
    }
    .card-plate.highlight-plate { background: #27ae60; }

    .card-info { flex: 1; min-width: 0; }
    .card-line1 {
      font-size: 0.95rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      display: flex; align-items: center; gap: 6px;
    }
    .card-line2 {
      font-size: 1rem; font-weight: 600; color: var(--text);
      margin-top: 5px;
    }
    .card-line3 {
      font-size: 0.95rem; color: var(--sub);
      margin-top: 2px;
    }

    .card-call {
      flex-shrink: 0; width: 38px; height: 38px;
      background: #d4ede5; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; text-decoration: none; transition: background 0.2s;
    }
    .card-call:active { background: #a8dbc8; }

    .type-badge { font-size: 0.75rem; font-weight: 500; color: var(--sub); }
    .type-승용차, .type-SUV, .type-트럭, .type-택시 { background: none; color: var(--sub); padding: 0; border-radius: 0; }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--sub);
      background: var(--surface); border-radius: 14px; border: 1px solid var(--border);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
    .empty-state h3 { font-size: 0.95rem; margin-bottom: 4px; }

    footer {
      text-align: center; font-size: 0.7rem; color: var(--sub);
      padding: 16px; border-top: 1px solid var(--border); margin-top: 16px;
    }

    @media (max-width: 640px) {
      .header-top { padding: 11px 14px 9px; }
      .search-bar  { padding: 8px 14px; gap: 8px; }
      main { padding: 12px 10px 50px; }
      .table-wrap { display: none !important; }
      .card-list {
        display: flex; border-radius: 14px;
        box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden;
      }
    }
    @media (min-width: 641px) {
      .card-list  { display: none !important; }
      .table-wrap { display: block !important; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="church-name">
      <h1>행복한교회 교우차량정보</h1>
      <div class="ver" id="verLine">Ver. —</div>
    </div>
    <div class="header-actions">
      <a href="admin.html">🔒 관리자</a>
    </div>
  </div>

  <div class="search-bar">
    <div class="plate-input-wrapper">
      <span class="prefix">●●● 가</span>
      <input type="text" id="searchInput" placeholder="0000"
        maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
      <button class="search-clear" id="clearBtn" style="display:none">✕</button>
    </div>
    <span class="total-badge" id="totalBadge">총 —대</span>
    <div class="result-count-badge" id="resultBadge" style="display:none">— 대</div>
  </div>
</header>

<main>
  <div class="status-bar">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">데이터 불러오는 중...</span>
  </div>

  <div class="loading-overlay" id="loadingEl">
    <div class="spinner"></div>
    <span>Google Sheets에서 불러오는 중...</span>
  </div>

  <div class="table-wrap" id="tableWrap" style="display:none">
    <table>
      <thead>
        <tr>
          <th>#</th><th>번호판</th><th>차종</th><th>색상</th><th>종류</th><th>소유주</th><th>전화번호</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="card-list" id="cardList" style="display:none"></div>

  <div class="empty-state" id="emptyState" style="display:none">
    <div class="icon">🔍</div>
    <h3>검색 결과가 없습니다</h3>
    <p>다른 번호로 검색해 보세요</p>
  </div>
</main>

<footer id="footerEl">행복한교회 교우차량정보</footer>

<script>
  let allData = [];

  // ── 검색
  const searchInput = document.getElementById('searchInput');
  const clearBtn    = document.getElementById('clearBtn');
  const totalBadge  = document.getElementById('totalBadge');
  const resultBadge = document.getElementById('resultBadge');

  searchInput.addEventListener('input', () => {
    const val = searchInput.value.replace(/\D/g, '');
    searchInput.value = val;
    clearBtn.style.display = val ? 'block' : 'none';
    // 검색 중일 때만 결과 뱃지 표시
    if (val) {
      totalBadge.style.display  = 'none';
      resultBadge.style.display = 'block';
    } else {
      totalBadge.style.display  = 'block';
      resultBadge.style.display = 'none';
    }
    render(val);
  });
  clearBtn.addEventListener('click', () => {
    searchInput.value = '';
    clearBtn.style.display    = 'none';
    totalBadge.style.display  = 'block';
    resultBadge.style.display = 'none';
    render('');
    searchInput.focus();
  });

  // ── 날짜 포맷 (구글 시트 최종 로드 시각)
  function nowKorean() {
    const d = new Date();
    return d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일 '
      + d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0') + ' 기준';
  }

  // ── 데이터 로드
  async function loadData() {
    if (!CONFIG.APPS_SCRIPT_URL || CONFIG.APPS_SCRIPT_URL.includes('YOUR_SCRIPT_ID')) {
      allData = DEFAULT_DATA;
      setStatus(false, '기본 데이터 사용 중');
      setVersion(false);
      showContent();
      return;
    }
    try {
      const res  = await fetch(CONFIG.APPS_SCRIPT_URL, { redirect: 'follow' });
      const json = await res.json();
      if (Array.isArray(json) && json.length > 0) {
        allData = json;
        setStatus(true, 'Google Sheets 연동됨');
        setVersion(true);
      } else throw new Error('empty');
    } catch (e) {
      allData = DEFAULT_DATA;
      setStatus(false, '기본 데이터 사용 중 (Sheets 연결 오류)');
      setVersion(false);
    }
    showContent();
  }

  function setVersion(fromSheets) {
    const dateStr = nowKorean();
    document.getElementById('verLine').textContent = 'Ver. ' + dateStr;
    document.getElementById('footerEl').textContent =
      '행복한교회 교우차량정보 · ' + (fromSheets ? 'Google Sheets ' : '기본 데이터 ') + dateStr;
  }

  function setStatus(ok, msg) {
    document.getElementById('statusDot').className = 'dot ' + (ok ? 'online' : 'offline');
    document.getElementById('statusText').textContent = msg;
  }

  function showContent() {
    document.getElementById('loadingEl').style.display = 'none';
    document.getElementById('tableWrap').style.display = 'block';
    document.getElementById('cardList').style.display  = '';
    totalBadge.textContent = '총 ' + allData.length + '대';
    render('');
  }

  function hlText(str, q) {
    if (!q) return str;
    return str.replace(q, '<span class="highlight">' + q + '</span>');
  }

  function render(query) {
    const tbody    = document.getElementById('tableBody');
    const cardList = document.getElementById('cardList');
    const emptyEl  = document.getElementById('emptyState');
    const tableWrap= document.getElementById('tableWrap');

    const filtered = query ? allData.filter(d => d.plateNum.includes(query)) : allData;
    resultBadge.textContent = filtered.length + '대';

    if (filtered.length === 0) {
      tbody.innerHTML = '';
      cardList.innerHTML = '';
      tableWrap.style.display = 'none';
      cardList.style.display  = 'none';
      emptyEl.style.display   = 'block';
      return;
    }
    tableWrap.style.display = 'block';
    cardList.style.display  = '';
    emptyEl.style.display   = 'none';

    const typeCls = t => 'type-badge type-' + encodeURIComponent(t);

    tbody.innerHTML = filtered.map((d, i) => `
      <tr>
        <td style="color:var(--sub);font-size:0.76rem">${i+1}</td>
        <td class="plate-cell">${hlText(d.plateNum, query)}</td>
        <td>${d.makerModel}</td>
        <td>${d.color}</td>
        <td><span class="${typeCls(d.vehicleType)}">${d.vehicleType}</span></td>
        <td class="owner-cell">${d.owner}</td>
        <td class="phone-cell">${d.phone}</td>
      </tr>`).join('');

    cardList.innerHTML = filtered.map(d => {
      const plateHl = query && d.plateNum.includes(query) ? 'highlight-plate' : '';
      return `
      <div class="vehicle-card">
        <div class="card-plate ${plateHl}">${hlText(d.plateNum, query)}</div>
        <div class="card-info">
          <div class="card-line1">${d.makerModel} · ${d.color} <span class="${typeCls(d.vehicleType)}">${d.vehicleType}</span></div>
          <div class="card-line2">${d.owner}</div>
          <div class="card-line3">${d.phone}</div>
        </div>
        <a class="card-call" href="tel:${d.phone}" title="전화걸기">📞</a>
      </div>`;
    }).join('');
  }

  loadData();
</script>
</body>
</html>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:   #1a5c45;
      --green2:  #236b52;
      --red:     #c0392b;
      --del:     #e74c3c;
      --bg:      #f0f7f4;
      --surface: #ffffff;
      --border:  #cce5da;
      --text:    #0d2e21;
      --sub:     #4a7a68;
      --shadow:  0 2px 12px rgba(26,92,69,0.10);
    }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    /* ── HEADER ── */
    header {
      background: #111e1a; color: #fff;
      padding: 13px 16px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }
    .header-left h1 { font-size: 1rem; font-weight: 700; }
    .header-left span { font-size: 0.68rem; opacity: 0.5; display: block; margin-top: 1px; }
    .header-right { display: flex; gap: 8px; }
    .btn-link {
      color: rgba(255,255,255,0.7); text-decoration: none;
      font-size: 0.72rem; padding: 5px 11px;
      border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
      white-space: nowrap; transition: background 0.2s;
    }
    .btn-link:hover { background: rgba(255,255,255,0.1); }

    /* ── LOGIN ── */
    #loginOverlay {
      position: fixed; inset: 0; background: rgba(17,30,26,0.92);
      display: flex; align-items: center; justify-content: center; z-index: 999;
    }
    .login-box {
      background: var(--surface); border-radius: 18px;
      padding: 36px 28px; width: min(340px, 90vw);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center;
    }
    .login-box .lock { font-size: 2.2rem; margin-bottom: 14px; }
    .login-box h2 { font-size: 1.05rem; color: var(--green); margin-bottom: 6px; }
    .login-box p  { font-size: 0.78rem; color: var(--sub); margin-bottom: 22px; }
    .login-box input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      font-family: 'Noto Sans KR', sans-serif; font-size: 1rem;
      outline: none; letter-spacing: 4px; margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .login-box input:focus { border-color: var(--green2); }
    .btn-login {
      width: 100%; padding: 13px;
      background: var(--green); color: #fff;
      border: none; border-radius: 10px;
      font-family: 'Noto Sans KR', sans-serif; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-login:hover { background: var(--green2); }
    .login-error { color: var(--red); font-size: 0.75rem; margin-top: 8px; min-height: 16px; }

    /* ── MAIN ── */
    main { max-width: 700px; margin: 0 auto; padding: 16px 12px 60px; }

    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
    }
    .status-bar { display: flex; align-items: center; gap: 7px; font-size: 0.75rem; color: var(--sub); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #bbb; animation: pulse 2s infinite; }
    .dot.online  { background: #2ecc71; }
    .dot.offline { background: #e67e22; animation: none; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    /* ── BUTTONS ── */
    .btn {
      padding: 9px 16px; border-radius: 8px;
      font-family: 'Noto Sans KR', sans-serif; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; border: none; transition: all 0.18s;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-primary:hover { background: var(--green2); }
    .btn-success { background: #27ae60; color: #fff; }
    .btn-success:hover { background: #229954; }
    .btn-danger  { background: var(--del); color: #fff; }
    .btn-danger:hover  { background: #c0392b; }
    .btn-ghost   { background: transparent; color: var(--green); border: 1.5px solid var(--border); }
    .btn-ghost:hover { background: #e8f5f0; }
    .btn-sm { padding: 6px 12px; font-size: 0.76rem; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── ADD PANEL ── */
    .add-panel {
      background: var(--surface);
      border: 2px dashed var(--green2);
      border-radius: 14px; padding: 18px 16px; margin-bottom: 16px;
    }
    .add-panel h3 {
      font-size: 0.88rem; color: var(--green); margin-bottom: 14px;
      display: flex; align-items: center; gap: 6px;
    }
    /* 2열 그리드 */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 0.72rem; color: var(--sub); font-weight: 500; }
    .form-group input, .form-group select {
      padding: 10px 11px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-family: 'Noto Sans KR', sans-serif; font-size: 0.88rem;
      outline: none; background: var(--bg); transition: border-color 0.2s;
      width: 100%;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--green2); background: #fff; }
    .form-actions { margin-top: 14px; display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }

    /* ── CARD LIST (모바일+데스크탑 공통) ── */
    .card-list { display: flex; flex-direction: column; gap: 8px; }

    .vehicle-card {
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 14px 14px 12px;
    }

    /* 카드 상단: 번호판 + 차종 + 수정/삭제 */
    .card-top {
      display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px;
    }
    .card-plate {
      background: var(--green); color: #fff;
      border-radius: 8px; padding: 7px 9px;
      font-size: 1.2rem; font-weight: 800; letter-spacing: 2px;
      flex-shrink: 0; line-height: 1;
    }
    .card-meta { flex: 1; min-width: 0; }
    .card-meta .model {
      font-size: 0.92rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-meta .detail { font-size: 0.78rem; color: var(--sub); margin-top: 2px; }
    .card-actions { display: flex; gap: 6px; flex-shrink: 0; }

    /* 카드 하단: 소유주·전화 */
    .card-bottom {
      border-top: 1px solid var(--border);
      padding-top: 10px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 6px;
    }
    .info-item { display: flex; flex-direction: column; gap: 2px; }
    .info-item .lbl { font-size: 0.65rem; color: var(--sub); }
    .info-item .val { font-size: 0.88rem; font-weight: 500; color: var(--text); }

    /* ── 수정 폼 (카드 내부) ── */
    .edit-form {
      background: #f0f7f4;
      border-radius: 10px;
      border: 1.5px solid var(--green2);
      padding: 14px;
      margin-top: 10px;
    }
    .edit-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .edit-grid .full { grid-column: 1 / -1; }
    .edit-group { display: flex; flex-direction: column; gap: 4px; }
    .edit-group label { font-size: 0.68rem; color: var(--sub); font-weight: 500; }
    .edit-group input, .edit-group select {
      padding: 8px 10px;
      border: 1.5px solid var(--border); border-radius: 7px;
      font-family: 'Noto Sans KR', sans-serif; font-size: 0.85rem;
      outline: none; background: #fff; transition: border-color 0.2s; width: 100%;
    }
    .edit-group input:focus, .edit-group select:focus { border-color: var(--green2); }
    .edit-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* spinner */
    .spinner-sm {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* toast */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #111e1a; color: #fff;
      padding: 11px 22px; border-radius: 30px;
      font-size: 0.83rem; font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
      z-index: 999; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* loading */
    .loading-box {
      text-align: center; padding: 50px 20px; color: var(--sub);
      background: var(--surface); border-radius: 14px; border: 1px solid var(--border);
    }
    .spinner-lg {
      width: 32px; height: 32px; margin: 0 auto 12px;
      border: 3px solid var(--border); border-top-color: var(--green2);
      border-radius: 50%; animation: spin .8s linear infinite;
    }
  </style>
</head>

<!-- 로그인 -->

    <input type="password" id="pwInput" placeholder="비밀번호 입력" autocomplete="current-password">
    <button class="btn-login" onclick="doLogin()">로그인</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<header>
  <div class="header-left">
    <h1>⚙️ 차량 정보 관리자</h1>
    <span>행복한교회 교우 차량 데이터</span>
  </div>
  <div class="header-right">
    <a href="index.html" class="btn-link">← 목록</a>
    <a href="#" class="btn-link" onclick="doLogout()">로그아웃</a>
  </div>
</header>

<main>
  <div class="toolbar">
    <div class="status-bar">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">초기화 중...</span>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="loadData()">🔄 새로고침</button>
  </div>

  <!-- 신규 등록 -->
  <div class="add-panel">
    <h3>➕ 신규 차량 등록</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>번호판 뒤 4자리 *</label>
        <input type="text" id="f_plateNum" placeholder="1234" maxlength="4" inputmode="numeric">
      </div>
      <div class="form-group">
        <label>종류 *</label>
        <select id="f_vehicleType">
          <option value="승용차">승용차</option>
          <option value="SUV">SUV</option>
          <option value="트럭">트럭</option>
          <option value="택시">택시</option>
        </select>
      </div>
      <div class="form-group">
        <label>차종 *</label>
        <input type="text" id="f_makerModel" placeholder="현대 소나타">
      </div>
      <div class="form-group">
        <label>색상 *</label>
        <input type="text" id="f_color" placeholder="흰색">
      </div>
      <div class="form-group">
        <label>차량 소유주 *</label>
        <input type="text" id="f_owner" placeholder="홍길동 집사">
      </div>
      <div class="form-group">
        <label>전화번호</label>
        <input type="text" id="f_phone" placeholder="010-0000-0000">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost btn-sm" onclick="clearForm()">초기화</button>
      <button class="btn btn-success" id="addBtn" onclick="addVehicle()">💾 저장</button>
    </div>
  </div>

  <!-- 차량 카드 목록 -->
  <div id="cardContainer">
    <div class="loading-box">
      <div class="spinner-lg"></div>
      <p>데이터 불러오는 중...</p>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
  let allData = [];
  let openEditIdx = null;

  /* ── AUTH ── */
  function doLogin() {
    if (document.getElementById('pwInput').value === CONFIG.ADMIN_PASSWORD) {
      sessionStorage.setItem('adminAuth', '1');
      document.getElementById('loginOverlay').style.display = 'none';
      loadData();
    } else {
      document.getElementById('loginError').textContent = '비밀번호가 올바르지 않습니다.';
      document.getElementById('pwInput').value = '';
    }
  }
  document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  function doLogout() { sessionStorage.removeItem('adminAuth'); location.reload(); }
  if (sessionStorage.getItem('adminAuth') === '1') {
    document.getElementById('loginOverlay').style.display = 'none';
    loadData();
  }

  /* ── TOAST ── */
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2800);
  }

  /* ── STATUS ── */
  function setStatus(ok, msg) {
    document.getElementById('statusDot').className = 'dot ' + (ok ? 'online' : 'offline');
    document.getElementById('statusText').textContent = msg;
  }

  /* ── LOAD ── */
  async function loadData() {
    document.getElementById('cardContainer').innerHTML =
      '<div class="loading-box"><div class="spinner-lg"></div><p>데이터 불러오는 중...</p></div>';
    if (CONFIG.APPS_SCRIPT_URL.includes('YOUR_SCRIPT_ID')) {
      allData = DEFAULT_DATA.map((d, i) => ({ ...d, rowIndex: i + 2 }));
      setStatus(false, '기본 데이터 (Sheets 미연동)');
      renderCards();
      return;
    }
    try {
      const res = await fetch(CONFIG.APPS_SCRIPT_URL, { redirect: 'follow' });
      allData = await res.json();
      setStatus(true, 'Google Sheets 연동됨 · ' + allData.length + '건');
    } catch(e) {
      allData = DEFAULT_DATA.map((d, i) => ({ ...d, rowIndex: i + 2 }));
      setStatus(false, 'Sheets 오류 — 기본 데이터 사용');
      toast('⚠️ Sheets 연결 실패');
    }
    renderCards();
  }

  /* ── RENDER CARDS ── */
  function renderCards() {
    const wrap = document.getElementById('cardContainer');
    if (!allData.length) {
      wrap.innerHTML = '<p style="text-align:center;padding:40px;color:var(--sub)">등록된 차량이 없습니다</p>';
      return;
    }
    wrap.innerHTML = '<div class="card-list">' +
      allData.map((d, i) => cardHTML(d, i)).join('') +
    '</div>';
  }

  function cardHTML(d, i) {
    return `<div class="vehicle-card" id="vc-${i}">
      <div class="card-top">
        <div class="card-plate">${esc(d.plateNum)}</div>
        <div class="card-meta">
          <div class="model">${esc(d.makerModel)} · ${esc(d.color)}</div>
          <div class="detail">${esc(d.vehicleType)}</div>
        </div>
        <div class="card-actions">
          <button class="btn btn-ghost btn-sm" onclick="openEdit(${i})">✏️ 수정</button>
          <button class="btn btn-danger btn-sm" onclick="deleteVehicle(${i})">🗑</button>
        </div>
      </div>
      <div class="card-bottom">
        <div class="info-item">
          <span class="lbl">차량 소유주</span>
          <span class="val">${esc(d.owner)}</span>
        </div>
        <div class="info-item">
          <span class="lbl">전화번호</span>
          <span class="val">${esc(d.phone)}</span>
        </div>
      </div>
    </div>`;
  }

  /* ── EDIT ── */
  function openEdit(i) {
    // 이미 열려있으면 닫기
    if (openEditIdx !== null) closeEdit(openEditIdx);
    openEditIdx = i;
    const d = allData[i];
    const card = document.getElementById('vc-' + i);
    const editDiv = document.createElement('div');
    editDiv.className = 'edit-form';
    editDiv.id = 'ef-' + i;
    editDiv.innerHTML = `
      <div class="edit-grid">
        <div class="edit-group">
          <label>번호판 뒤 4자리</label>
          <input id="e_plateNum" value="${esc(d.plateNum)}" maxlength="4" inputmode="numeric">
        </div>
        <div class="edit-group">
          <label>종류</label>
          <select id="e_vehicleType">
            <option value="승용차" ${d.vehicleType==='승용차'?'selected':''}>승용차</option>
            <option value="SUV"    ${d.vehicleType==='SUV'?'selected':''}>SUV</option>
            <option value="트럭"   ${d.vehicleType==='트럭'?'selected':''}>트럭</option>
            <option value="택시"   ${d.vehicleType==='택시'?'selected':''}>택시</option>
          </select>
        </div>
        <div class="edit-group">
          <label>차종</label>
          <input id="e_makerModel" value="${esc(d.makerModel)}">
        </div>
        <div class="edit-group">
          <label>색상</label>
          <input id="e_color" value="${esc(d.color)}">
        </div>
        <div class="edit-group">
          <label>차량 소유주</label>
          <input id="e_owner" value="${esc(d.owner)}">
        </div>
        <div class="edit-group">
          <label>전화번호</label>
          <input id="e_phone" value="${esc(d.phone)}">
        </div>
      </div>
      <div class="edit-actions">
        <button class="btn btn-ghost btn-sm" onclick="closeEdit(${i})">취소</button>
        <button class="btn btn-success btn-sm" id="saveBtn-${i}" onclick="saveEdit(${i})">💾 저장</button>
      </div>`;
    card.appendChild(editDiv);
    // 수정 버튼 비활성
    card.querySelector('.btn-ghost').disabled = true;
  }

  function closeEdit(i) {
    const ef = document.getElementById('ef-' + i);
    if (ef) ef.remove();
    const card = document.getElementById('vc-' + i);
    if (card) card.querySelector('.btn-ghost').disabled = false;
    openEditIdx = null;
  }

  async function saveEdit(i) {
    const updated = { ...allData[i],
      plateNum:    document.getElementById('e_plateNum').value.trim(),
      makerModel:  document.getElementById('e_makerModel').value.trim(),
      color:       document.getElementById('e_color').value.trim(),
      vehicleType: document.getElementById('e_vehicleType').value,
      owner:       document.getElementById('e_owner').value.trim(),
      phone:       document.getElementById('e_phone').value.trim()
    };
    const btn = document.getElementById('saveBtn-' + i);
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-sm"></span> 저장 중';
    try {
      await apiCall({ action: 'update', rowIndex: updated.rowIndex, data: updated });
      allData[i] = updated;
      toast('✅ ' + updated.owner + ' 정보가 수정되었습니다');
    } catch(e) { toast('❌ 저장 실패: ' + e.message); }
    openEditIdx = null;
    renderCards();
  }

  /* ── ADD ── */
  async function addVehicle() {
    const plateNum   = document.getElementById('f_plateNum').value.trim();
    const makerModel = document.getElementById('f_makerModel').value.trim();
    const color      = document.getElementById('f_color').value.trim();
    const vehicleType= document.getElementById('f_vehicleType').value;
    const owner      = document.getElementById('f_owner').value.trim();
    const phone      = document.getElementById('f_phone').value.trim();
    if (!plateNum || !makerModel || !color || !owner) {
      toast('⚠️ 필수 항목을 입력해주세요');
      return;
    }
    const btn = document.getElementById('addBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-sm"></span> 저장 중...';
    const newEntry = { plateNum, makerModel, color, vehicleType, owner, phone };
    try {
      const result = await apiCall({ action: 'add', data: newEntry });
      newEntry.rowIndex = result.rowIndex || (allData.length + 2);
      allData.push(newEntry);
      toast('✅ ' + owner + ' 차량이 등록되었습니다');
      clearForm();
      renderCards();
    } catch(e) { toast('❌ 등록 실패: ' + e.message); }
    btn.disabled = false;
    btn.innerHTML = '💾 저장';
  }

  /* ── DELETE ── */
  async function deleteVehicle(i) {
    const d = allData[i];
    if (!confirm('[' + d.plateNum + '] ' + d.owner + ' 차량을 삭제하시겠습니까?')) return;
    try {
      await apiCall({ action: 'delete', rowIndex: d.rowIndex });
      allData.splice(i, 1);
      toast('🗑 ' + d.owner + ' 차량이 삭제되었습니다');
      renderCards();
    } catch(e) { toast('❌ 삭제 실패: ' + e.message); }
  }

  /* ── API ── */
  async function apiCall(payload) {
    if (CONFIG.APPS_SCRIPT_URL.includes('YOUR_SCRIPT_ID')) return { success: true, rowIndex: allData.length + 2 };
    const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
      method: 'POST', redirect: 'follow',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  }

  function clearForm() {
    ['f_plateNum','f_makerModel','f_color','f_owner','f_phone'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f_vehicleType').value = '승용차';
  }

  function esc(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
